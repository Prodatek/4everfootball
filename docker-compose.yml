services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fourever
      POSTGRES_PASSWORD: fourever
      POSTGRES_DB: fourever
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.9
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: dev_meili_master_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fourever
      MINIO_ROOT_PASSWORD: fourever123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - minio_data:/data

  # One-shot helper: creates the media bucket and makes it publicly readable
  # (uploaded images are served directly by MinIO, no presigned GET needed).
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 fourever fourever123; do sleep 1; done;
      mc mb --ignore-existing local/media;
      mc anonymous set download local/media;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      # Override the .env's localhost URLs with in-network service hostnames.
      DATABASE_URL: "postgresql://fourever:fourever@postgres:5432/fourever?schema=public"
      S3_ENDPOINT: "http://minio:9000"
      MEILISEARCH_HOST: "http://meilisearch:7700"
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - meilisearch
      - minio

  # One-shot: applies pending Prisma migrations against `postgres`. Targets the
  # `build` stage (not the pruned `runtime` image) because that's the one with
  # the `prisma` CLI still installed. Run explicitly with:
  #   docker compose run --rm api-migrate
  api-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: build
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: "postgresql://fourever:fourever@postgres:5432/fourever?schema=public"
    working_dir: /repo
    entrypoint: ["pnpm", "--filter", "@4ef/api", "exec", "prisma", "migrate", "deploy"]
    depends_on:
      - postgres

  # Prisma Studio on its default port, browsing whatever `postgres` currently
  # holds. Also targets `build` for the same reason as api-migrate above.
  prisma-studio:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: build
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: "postgresql://fourever:fourever@postgres:5432/fourever?schema=public"
    working_dir: /repo
    entrypoint:
      ["pnpm", "--filter", "@4ef/api", "exec", "prisma", "studio", "--port", "5555", "--browser", "none"]
    ports:
      - "5555:5555"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the client bundle at build time — must be reachable from
        # the browser, not from inside the compose network. Override this
        # build arg for any non-localhost deployment.
        NEXT_PUBLIC_API_URL: "http://localhost:4000"
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
